---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: victoria-logs-single
      version: 0.13.9
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    fluent-bit:
      enabled: false
    server:
      route:
        enabled: true
        hostnames:
          - "logs.${S_HOMEPROD_DOMAIN}"
        parentRefs:
          - name: envoy-gateway
            namespace: ingress
      persistentVolume:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 10Gi
        storageClassName: nfs-client
