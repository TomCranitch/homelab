---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.86.0
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    fullnameOverride: vm-stack
    defaultDashboards:
      enabled: true
      grafanaOperator:
        enabled: true
    grafana:
      enabled: false
    vmagent:
      route:
        enabled: true
        hostnames:
          - &vmagent-host "vmagent.${S_HOMEPROD_DOMAIN}"
        parentRefs:
          - name: envoy-gateway
            namespace: ingress
    vmsingle:
      spec:
        storage:
          storageClassName: "ceph-block"
          resources:
            requests:
              storage: 30Gi
      route:
        enabled: true
        hostnames:
          - &vmsingle-host "vmsingle.${S_HOMEPROD_DOMAIN}"
        parentRefs:
          - name: envoy-gateway
            namespace: ingress
    prometheus-node-exporter:
      enabled: false
    victoria-metrics-operator:
      operator:
        disable_prometheus_converter: false
      env:
        - name: VM_GATEWAY_API_ENABLED
          value: "true"
