---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgmqtt
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: pgmqtt
      version: 0.1.17
      sourceRef:
        kind: HelmRepository
        name: pgmqtt-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    replicaCount: 2
    database:
      existingSecret: default-cluster-pguser-pgmqtt
      existingSecretKey: uri
    auth:
      allowAnonymous: false
    serviceMonitor:
      enabled: true
    metrics:
      enabled: true
    logging:
      format: text
