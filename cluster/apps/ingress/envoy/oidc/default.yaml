---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: esphome
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: zigbee2mqtt
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: linkding
  oidc:
    provider:
      issuer: "https://sso.${S_HOMEPROD_DOMAIN}/application/o/gateway/"
    clientID: "8lRVJAKvaAvnGZVcrSVtFbMkmpLBQoauOi0fOuAZ"
    clientSecret:
      name: envoy-oidc-secret
    redirectURL: "https://echo.${S_HOMEPROD_DOMAIN}/oauth2/callback"
    logoutPath: "/oauth2/logout"
    cookieDomain: "${S_HOMEPROD_DOMAIN}"
