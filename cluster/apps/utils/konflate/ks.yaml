apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app konflate
  namespace: flux-system
spec:
  targetNamespace: utils
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./cluster/apps/utils/konflate/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
