apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: konflate
      version: '0.1.2'
      sourceRef:
        kind: HelmRepository
        name: home-operations
        namespace: flux-system
  values:
    config:
      repo: github://TomCranitch/homelab
      clusterPath: cluster
      appClientId: "${SECRET_KONFLATE_APP_ID}"
      installationId: "${SECRET_KONFLATE_INSTALLATION_ID}"
      statusChecks: true
      strictFailures: true
    secret:
      existingSecret: konflate-secret
    persistence:
      enabled: true
      size: 5Gi
