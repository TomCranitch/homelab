---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgdump-backup
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: raw
      version: v0.3.2
      sourceRef:
        kind: HelmRepository
        name: dysnix-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    resources:
      - apiVersion: batch/v1
        kind: CronJob
        metadata:
          name: postgres-dump
        spec:
          # Dump both PostgreSQL clusters one hour before VolSync snapshots the PVC.
          schedule: "0 1 * * *"
          concurrencyPolicy: Forbid
          jobTemplate:
            spec:
              backoffLimit: 0
              template:
                spec:
                  runtimeClassName: gvisor
                  containers:
                    - name: dump
                      image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
                      volumeMounts:
                        - name: data
                          mountPath: /backup
                      args:
                        - pg_dumpall
                        - "-f"
                        - "/backup/postgres.pgdump"
                        - "-v"
                        - "--dbname=$(DATABASE_URL)"
                      env:
                        - name: DATABASE_URL
                          valueFrom:
                            secretKeyRef:
                              name: default-cluster-pguser-postgres
                              key: uri
                    - name: dump-immich
                      image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
                      volumeMounts:
                        - name: data
                          mountPath: /backup
                      args:
                        - pg_dumpall
                        - "-f"
                        - "/backup/postgres-immich.pgdump"
                        - "-v"
                        - "--dbname=$(DATABASE_URL)"
                      env:
                        - name: DATABASE_URL
                          valueFrom:
                            secretKeyRef:
                              name: immich-cluster-pguser-postgres
                              key: uri
                  restartPolicy: Never
                  volumes:
                    - name: data
                      persistentVolumeClaim:
                        claimName: pgdump
