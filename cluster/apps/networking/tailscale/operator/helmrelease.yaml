apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: networking
spec:
  chartRef:
    kind: OCIRepository
    name: tailscale-operator
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    proxyConfig:
      defaultProxyClass: spread
