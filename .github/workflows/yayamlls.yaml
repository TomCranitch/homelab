---
name: Validate YAML

on:
  push:
    paths:
      - "**/*.yaml"
      - "**/*.yml"
  pull_request:
    paths:
      - "**/*.yaml"
      - "**/*.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.26"

      - name: Install yayamlls
        run: go install github.com/home-operations/yayamlls/cmd/yayamlls@latest

      - name: Validate source manifests
        run: yayamlls validate .
