name: PR Diffs
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, edited, closed]
jobs:
  diffs:
    name: Compute diffs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.7.5

      - name: Setup flate
        uses: home-operations/flate/action@main

      - name: Generate diff
        id: diff
        run: |
          # Fetch the default branch to diff against
          default_branch=${{ github.event.repository.default_branch }}
          if [ -z "$default_branch" ]; then
            default_branch="main"
          fi
          git fetch origin $default_branch

          # Generate the diff and store it in a file
          flate diff all --path cluster --base origin/$default_branch > diff.txt

          # We check if there is any actual diff content
          if [ -s diff.txt ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
            # Prepare the comment body. We read the file content.
            # Using EOF to handle multiline strings safely in GitHub Actions
            EOF_MARKER=$(openssl rand -hex 8)
            echo "diff_content<<$EOF_MARKER" >> $GITHUB_OUTPUT
            cat diff.txt >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$EOF_MARKER" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: PR Comments
        uses: mshick/add-pr-comment@v2
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          message-id: ${{ github.event.pull_request.number }}/all-diff
          message-failure: Unable to post kustomization diff
          message: |
            <details>
            <summary>Diff</summary>

            `````diff
            ${{ steps.diff.outputs.diff_content }}
            `````
            </details>
